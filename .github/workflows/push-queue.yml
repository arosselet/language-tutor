name: Push Queue Drain
# The delivery tick for scheduled pushes (progress/push_queue.json). No LLM, no
# TTS — entries are fully composed at add-time; this just fires whatever is due
# and logs it into knock_log.json (so replies get judged and the knock rails see
# the reach). Runs every 30 min for close-to-precise delivery (GitHub's own
# schedule dispatch can still slip under load — a live laptop session can
# always drain locally for exact timing).
on:
  schedule:
    - cron: "*/30 * * * *"     # every 30 min, off the top-of-hour congestion
  workflow_dispatch: {}

permissions:
  contents: write              # drain commits the updated queue + knock log

concurrency:
  group: push-queue
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # A template clone ticks before it's set up — that's a valid state, not a
      # failure. Skip clean (and cheap: before Python setup / pip install).
      - name: Bootstrap gate
        id: boot
        run: |
          if [ -f config/tutor.json ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Not bootstrapped yet (config/tutor.json missing) — tick skipped. Run /setup to begin."
          fi
      - uses: actions/setup-python@v5
        if: steps.boot.outputs.ok == 'true'
        with:
          python-version: "3.12"
      - if: steps.boot.outputs.ok == 'true'
        run: pip install -r requirements.txt
      - name: Drain due pushes
        if: steps.boot.outputs.ok == 'true'
        env:
          PUSH_WEBHOOK_URL: ${{ secrets.PUSH_WEBHOOK_URL }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python scripts/push_queue.py drain
