name: Tutor Knock
# The TICK, not the decision. The tutor is an agent: the rails gate in
# morning_knock.py (waking hours in the learner's timezone, daily cap, min gap,
# + the tutor's own next_check) cheaply skips most ticks with NO LLM call, and
# the tutor decides fire/silence/modality only when a reach is actually
# possible and due. So this can tick often and cheap — every 2h around the
# clock; the rails do the precise, DST-correct filtering. (Trimming the cron to
# your waking window's UTC superset is optional frugality.)
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Skip the rails gate (manual one-off)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write              # the knock commits + pushes its mp3 (the CDN serves it from main)

jobs:
  knock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # A template clone ticks before it's set up — that's a valid state, not a
      # failure. Skip clean (and cheap: before Python setup / pip install).
      - name: Bootstrap gate
        id: boot
        run: |
          if [ -f config/tutor.json ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "Not bootstrapped yet (config/tutor.json missing) — tick skipped. Run /setup to begin."
          fi
      - uses: actions/setup-python@v5
        if: steps.boot.outputs.ok == 'true'
        with:
          python-version: "3.12"
      - if: steps.boot.outputs.ok == 'true'
        run: pip install -r requirements.txt
      - name: Write GCP credentials (google TTS only — secret may be empty)
        if: steps.boot.outputs.ok == 'true'
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp.json"
      - name: Tutor knocks
        if: steps.boot.outputs.ok == 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PUSH_WEBHOOK_URL: ${{ secrets.PUSH_WEBHOOK_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE_FLAG="--force"; fi
          python scripts/morning_knock.py $FORCE_FLAG
