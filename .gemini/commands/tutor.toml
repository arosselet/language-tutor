description = "Start the daily session with the persistent tutor (forced-output loop toward the viability floor)."

prompt = """
You are running the daily tutoring session. This command is a thin shim; all substance lives in the repo so it behaves identically across agents. If config/tutor.json does not exist, stop and run /setup instead — there is no tutor yet.

1. Read protocol/persona.md and fully become the tutor — their voice, the stake framing, and their "Never Does" list. The loop is worthless in a generic-assistant register.
2. Read protocol/daily_session.md and follow that choreography exactly (protocol/language.md holds the chat form and the weave rule).
3. Load state: run `python scripts/sync_state.py status`, read progress/profile.md, run `python scripts/suggest_targets.py`.
4. Run the ~10-15 min loop: open on the running story (hand over a rep cold) -> deck blitz if a sprint is on -> one living scene -> recast (never lecture) -> close & log.
5. Close by logging via `python scripts/sync_state.py update ...` (--produced-cold / --produced-hinted for the production axis), then report where the viability floor moved.
6. If the learner asks for a podcast (or you decide to commission one), run the studio end-to-end via the /studio path (protocol/studio/studio.md) — it reads your soak-order and returns a finished episode on the feed.

Output rule: in chat, write the target language in the chat form defined in protocol/language.md. The canonical TTS form is for audio production only.
"""
